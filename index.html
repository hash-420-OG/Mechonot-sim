        // פונקציה לערבוב שאלות ותשובות
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        let selectedQuestions = [];

        function initQuiz() {
            let shuffledBank = [...questionBank];
            shuffleArray(shuffledBank);
            
            // בוחר בדיוק 40 שאלות למבחן הנוכחי!
            selectedQuestions = shuffledBank.slice(0, 40);
            
            const container = document.getElementById('quiz-container');
            let html = '';
            
            selectedQuestions.forEach((sq, index) => {
                let optionsWithIndex = sq.options.map((opt, i) => ({ text: opt, originalIndex: i }));
                shuffleArray(optionsWithIndex);

                html += `
                <div class="question-block">
                    <div class="question-text">שאלה ${index + 1}: ${sq.q}</div>
                `;
                
                if (sq.img && sq.img !== "") {
                    html += `<img src="${sq.img}" class="q-img" onerror="this.style.display='none'">`;
                }

                html += `<div class="options">`;
                optionsWithIndex.forEach((opt) => {
                    html += `
                        <label>
                            <input type="radio" name="q${index}" value="${opt.originalIndex}">
                            ${opt.text}
                        </label>
                    `;
                });
                html += `</div></div>`;
            });
            container.innerHTML = html;
        }

        function submitQuiz() {
            let correctAnswersCount = 0;
            let resultsHtml = '<h2>סיכום ותוצאות המבחן</h2>';
            let mistakesHtml = '';

            selectedQuestions.forEach((sq, index) => {
                const selectedOption = document.querySelector(`input[name="q${index}"]:checked`);
                
                if (selectedOption) {
                    const userAns = parseInt(selectedOption.value);
                    if (userAns === sq.ans) {
                        correctAnswersCount++;
                    } else {
                        mistakesHtml += `
                        <div class="mistake-box">
                            <p><strong>${sq.q}</strong></p>
                            <p class="wrong-ans">התשובה שסימנת: ${sq.options[userAns]}</p>
                            <p class="correct-ans">התשובה הנכונה: ${sq.options[sq.ans]}</p>
                        </div>`;
                    }
                } else {
                    mistakesHtml += `
                    <div class="mistake-box">
                        <p><strong>${sq.q}</strong></p>
                        <p class="wrong-ans">לא סימנת תשובה לשאלה זו.</p>
                        <p class="correct-ans">התשובה הנכונה: ${sq.options[sq.ans]}</p>
                    </div>`;
                }
            });

            const totalQuestions = selectedQuestions.length;
            const finalScore = Math.round((correctAnswersCount / totalQuestions) * 100);
            
            if (finalScore >= 55) {
                resultsHtml += `<h1 class="score-pass">ציון סופי: ${finalScore} - עברת! 🎉</h1>`;
            } else {
                resultsHtml += `<h1 class="score-fail">ציון סופי: ${finalScore} - נכשלת. לא נורא, ממשיכים לתרגל! 💪</h1>`;
            }

            if (mistakesHtml !== '') {
                resultsHtml += `<h3>פירוט הטעויות שלך:</h3>${mistakesHtml}`;
            } else {
                resultsHtml += `<h3 style="color:#1e8e3e;">כל הכבוד! ענית נכון על כל השאלות!</h3>`;
            }

            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = resultsHtml;
            resultsDiv.style.display = 'block';
            
            resultsDiv.scrollIntoView({ behavior: 'smooth' });
        }

        window.onload = initQuiz;
    </script>
